services:
  - type: web
    name: atm
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false        # Set in Render dashboard → Environment → Secret
      - key: DATABASE_URL_UNPOOLED
        sync: false        # Set in Render dashboard → Environment → Secret
      - key: NEON_AUTH_BASE_URL
        sync: false
      - key: NEON_AUTH_JWKS_URL
        sync: false
      - key: DEV_AGENT_TOKEN
        sync: false
      - key: PORT
        value: "3000"
